<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>
    <!-- Latest compiled and minified CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
</head>

<style>
    body {
         background: #f4f6fb;
    }

    .col-md-3{
        margin-bottom: 40px;
    }

    .container{
        max-width:1200px;
    }

    .navbar {
        background: linear-gradient(90deg, #4169E1, #5a7df0);
        border: none;
        padding: 12px 30px;
    }

    .navbar-brand {
        font-size: 22px;
        letter-spacing: 0.5px;
    }

    .nav > li > a {
        color: white !important;
        font-weight: 500;
    }

    .nav > li > a:hover {
        background: transparent !important;
        opacity: 0.8;
    }

    .text-blue {
        color: #4169E1;
        font-weight: 600;
    }

    .card {
        background: white;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        transition: all 0.25s ease;
        height: 100%;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .card-img-top {
        width: 100%;
        height: 260px;
        object-fit: cover;
        border-radius: 12px;
    }

    h3 {
        font-size: 17px;
        font-weight: 700;
        line-height: 1.3;
        min-height: 50px;
    }

    p {
        margin: 3px 0;
        font-size: 14px;
    }
</style>

<body>

    <nav class="navbar navbar-default">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" style="color:white;">📚 My Book Recommender</a>
            </div>
            <ul class="nav navbar-nav navbar-right">
                <li><a href="/">Home</a></li>
                <li><a href="/recommend">Recommend</a></li>
                <li><a>Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top:40px; margin-bottom:60px;">

    <!-- Heading + Form -->
    <div class="row">
        <div class="col-md-12">
            <h1 class="text-blue"
                style="font-size:40px; margin-bottom:25px; font-weight:700; text-align:center;">
                Recommended Books
            </h1>

            <form style="max-width:450px; margin:0 auto 40px auto;"
                  action="/recommend_books"
                  method="post">
                <input type="text"
                       name="user_input"
                       class="form-control"
                       placeholder="Enter a book name..."
                       style="border-radius:8px; height:45px; margin-bottom:12px;">

                <input type="submit"
                       value="Get Recommendations"
                       class="btn btn-warning btn-lg"
                       style="width:100%; border-radius:8px;">
            </form>

            {% if error %}
    <h3 style="color:red; text-align:center;">{{ error }}</h3>
            {% endif %}
        </div>
    </div>

    <!-- Cards Row -->
    {% if data %}
    <div class="row">
        {% for i in data %}
        <div class="col-md-3" style="margin-bottom:40px;">
            <div class="card">
                <img class="card-img-top" src="{{i[2]}}">
                <h3 class="text-blue">{{i[0]}}</h3>
                <p class="text-blue">{{i[1]}}</p>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}

</div>

    </div>

</body>


</html>
